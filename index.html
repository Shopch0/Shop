<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH_LINGERIE</title>
    <style>
        :root { --dark-pink: #d95988; --gold: #b89060; --soft-gray: #f9f9f9; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; }
        
        header {
            background: #fff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--dark-pink); letter-spacing: 1px; }
        
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; background: none; border: none; }
        .cart-count { 
            position: absolute; top: 0; right: 0; background: var(--dark-pink); 
            color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; 
        }

        .cart-sidebar {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.2); z-index: 2000;
            padding: 20px; overflow-y: auto;
        }
        .cart-sidebar.open { right: 0; }

        .hero { height: 20vh; background: #fce4ec; display: flex; align-items: center; justify-content: center; margin-top: 60px; text-align: center; }
        .hero h1 { color: #444; font-size: 1.8rem; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 30px 5%; }
        .product-card { background: var(--soft-gray); padding: 15px; text-align: center; border-radius: 15px; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .product-card h3 { font-size: 1.1rem; margin: 10px 0; color: #333; }
        
        .new-price { color: var(--dark-pink); font-size: 1.25rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .btn-add { background: var(--dark-pink); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        .btn-add:hover { background: #b84a72; }

        .order-section { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 10px; display: none; }
        .btn-checkout { background: var(--gold); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .order-form { display: none; margin-top: 15px; }
        .order-form input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-qty { background: var(--gold); color: white; padding: 2px 7px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CH_LINGERIE</div>
        <button class="cart-icon" onclick="toggleCart()">🛒 <span class="cart-count" id="cart-count">0</span></button>
    </header>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">سلة المشتريات</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer; color:#888;">×</button>
        </div>
        <hr>
        <div id="cart-items"></div>
        <div class="order-section" id="order-section">
            <p style="font-size: 1.1rem;"><strong>الإجمالي:</strong> <span id="cart-total">0</span> دج</p>
            <button class="btn-checkout" id="checkout-btn" onclick="openOrderForm()">إتمام الطلب</button>
            
            <div class="order-form" id="order-form">
                <input type="text" id="cust-name" placeholder="الاسم الكامل">
                <input type="text" id="cust-address" placeholder="العنوان والولاية">
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
                <button class="btn-whatsapp" onclick="sendToWhatsApp()">
                    تأكيد الطلب عبر واتساب ✅
                </button>
            </div>
        </div>
    </div>

    <section class="hero">
        <h1>مجموعتنا الجديدة 2026</h1>
    </section>

    <div class="products-grid" id="grid"></div>

    <script>
        // تذكري وضع رقم هاتفك هنا بدلاً من XXXXXXXXX
        const WHATSAPP_NUM = "213XXXXXXXXX"; 

        const products = [
            { id: 1,  img: "1",  ar: "خمار موديل 1", price: 3500 },
            { id: 2,  img: "6",  ar: "خمار موديل 2", price: 2500 },
            { id: 3,  img: "9",  ar: "حجاب فلة",    price: 2500 },
            { id: 4,  img: "10", ar: "بيجامة",      price: 2200 },
            // المنتجات الجديدة من 11 إلى 15
            { id: 5,  img: "11", ar: "منتج موديل 11", price: 1000 },
            { id: 6,  img: "12", ar: "منتج موديل 12", price: 1000 },
            { id: 7,  img: "13", ar: "منتج موديل 13", price: 1000 },
            { id: 8,  img: "14", ar: "منتج موديل 14", price: 1000 },
            { id: 9,  img: "15", ar: "منتج موديل 15", price: 1000 }
        ];

        let cart = {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}.jpg" alt="${p.ar}" onerror="this.src='https://via.placeholder.com/300x400?text=Image+Missing'">
                    <h3>${p.ar}</h3>
                    <span class="new-price">${p.price} دج</span>
                    <button class="btn-add" onclick="addToCart(${p.id})">أضيفي للسلة</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            if (cart[id]) {
                cart[id].qty++;
            } else {
                const p = products.find(i => i.id === id);
                cart[id] = { ...p, qty: 1 };
            }
            updateUI();
            document.getElementById('cart-sidebar').classList.add('open');
        }

        function updateUI() {
            const list = document.getElementById('cart-items');
            const orderSection = document.getElementById('order-section');
            let total = 0;
            let count = 0;
            list.innerHTML = '';
            
            const cartKeys = Object.keys(cart);
            if (cartKeys.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">السلة فارغة حالياً</p>';
                orderSection.style.display = 'none';
            } else {
                orderSection.style.display = 'block';
                cartKeys.forEach(id => {
                    const item = cart[id];
                    total += item.price * item.qty;
                    count += item.qty;
                    list.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong>${item.ar}</strong> 
                                <span class="item-qty">×${item.qty}</span>
                            </div>
                            <span>${item.price * item.qty} دج</span>
                        </div>`;
                });
            }
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-count').innerText = count;
        }

        function openOrderForm() {
            document.getElementById('order-form').style.display = 'block';
            document.getElementById('checkout-btn').style.display = 'none';
        }

        function sendToWhatsApp() {
            const n = document.getElementById('cust-name').value;
            const a = document.getElementById('cust-address').value;
            const p = document.getElementById('cust-phone').value;
            
            if(!n || !a || !p) {
                alert("يرجى ملء الاسم والعنوان ورقم الهاتف لإتمام الطلب.");
                return;
            }

            let msg = `طلب جديد من متجر CH_LINGERIE:\n\n`;
            msg += `👤 الاسم: ${n}\n`;
            msg += `📍 العنوان: ${a}\n`;
            msg += `📞 الهاتف: ${p}\n\n`;
            msg += `📦 المنتجات:\n`;
            
            for (let id in cart) {
                msg += `- ${cart[id].ar} (عدد: ${cart[id].qty})\n`;
            }
            
            msg += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText} دج`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`);
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
        }

        render();
    </script>
</body>
</html>
