<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيليغانس بوتيك | Elegance Boutique</title>
    <style>
        :root {
            --dark-pink: #d95988;
            --gold: #b89060;
            --soft-gray: #f9f9f9;
        }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; scroll-behavior: smooth; }
        
        header {
            background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--dark-pink); }
        .lang-btn { background: #eee; border: none; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .lang-btn.active { background: var(--gold); color: white; }

        .hero {
            height: 35vh; background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
            url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1000');
            background-size: cover; background-position: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; margin-top: 60px;
        }

        .section { padding: 30px 5%; }
        .section-title { text-align: center; font-size: 2rem; margin-bottom: 30px; color: var(--gold); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--soft-gray); padding: 15px; text-align: center; border-radius: 12px; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 380px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        
        .new-price { color: var(--dark-pink); font-size: 1.2rem; font-weight: bold; }
        .btn-add { background: var(--dark-pink); color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px; }

        footer { background: #222; color: #fff; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">إيليغانس بوتيك</div>
        <div>
            <button class="lang-btn active">عربي</button>
        </div>
    </header>

    <section class="hero">
        <h1>مجموعتنا الجديدة 2026</h1>
        <p>أرقى الموديلات الجزائرية بأسعار تنافسية</p>
    </section>

    <section class="section">
        <h2 class="section-title">أحدث الموديلات</h2>
        <div class="products-grid" id="grid">
            </div>
    </section>

    <footer><p>© 2026 إيليغانس بوتيك - جميع الحقوق محفوظة</p></footer>

    <script>
        // مصفوفة المنتجات بناءً على طلبك
        const products = [
            { id: 1, name: "خمار", price: "1200 دج" },
            { id: 2, name: "خمار", price: "1200 دج" },
            { id: 3, name: "خمار", price: "1200 دج" },
            { id: 4, name: "خمار", price: "1200 دج" },
            { id: 5, name: "خمار", price: "1200 دج" },
            { id: 6, name: "خمار", price: "1200 دج" },
            { id: 7, name: "خمار", price: "1200 دج" },
            { id: 8, name: "خمار", price: "1200 دج" },
            { id: 9, name: "حجاب فلة", price: "4500 دج" },
            { id: 10, name: "بيجاما", price: "2800 دج" }
        ];

        const grid = document.getElementById('grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.id}.jpg" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price-box">
                        <span class="new-price">${p.price}</span>
                    </div>
                    <button class="btn-add">أضيفي للسلة</button>
                </div>
            `;
        });
    </script>
</body>
</html>
