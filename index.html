<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH_LINGERIE</title>
    <style>
        :root { --dark-pink: #d95988; --gold: #b89060; --soft-gray: #f9f9f9; --instagram: #E1306C; --whatsapp: #25D366; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; padding-bottom: 30px; }
        
        header {
            background: #fff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--dark-pink); }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; background: none; border: none; }
        .cart-count { position: absolute; top: 0; right: 0; background: var(--dark-pink); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        .cart-sidebar {
            position: fixed; top: 0; right: -320px; width: 310px; height: 100%;
            background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.2); z-index: 2000;
            padding: 20px; overflow-y: auto;
        }
        .cart-sidebar.open { right: 0; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 30px 5%; margin-top: 70px; }
        .product-card { background: var(--soft-gray); padding: 15px; text-align: center; border-radius: 15px; border: 1px solid #eee; }
        .product-card img { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        
        .new-price { color: var(--dark-pink); font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .btn-add { background: var(--dark-pink); color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; }

        .order-section { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 10px; display: none; }
        .order-form input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        
        .contact-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .contact-btn {
            padding: 12px; border-radius: 25px; color: white; border: none;
            font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .bg-insta { background: var(--instagram); }
        .bg-wa { background: var(--whatsapp); }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .qty-badge { background: var(--gold); color: white; padding: 2px 6px; border-radius: 8px; font-size: 0.75rem; margin-right: 5px; }
        .remove-item { color: red; cursor: pointer; font-weight: bold; margin-right: 10px; background: none; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CH_LINGERIE</div>
        <button class="cart-icon" onclick="toggleCart()">🛒 <span class="cart-count" id="cart-count">0</span></button>
    </header>

    <div class="cart-sidebar" id="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>سلة التسوق</h3>
            <button onclick="toggleCart()" style="background:none; border:none; font-size:2rem; cursor:pointer;">×</button>
        </div>
        <hr>
        <div id="cart-items"></div>
        
        <div class="order-section" id="order-section">
            <p><strong>الإجمالي:</strong> <span id="cart-total">0</span> دج</p>
            <div class="order-form">
                <input type="text" id="cust-name" placeholder="الاسم الكامل">
                <input type="text" id="cust-address" placeholder="العنوان (الولاية والبلدية)">
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
                
                <p style="font-size: 0.75rem; color: #666; margin: 5px 0;">عند الضغط، سيتم نسخ الطلب وتفتح المحادثة:</p>
                <div class="contact-options">
                    <button class="contact-btn bg-wa" onclick="processOrder('wa')">عبر واتساب</button>
                    <button class="contact-btn bg-insta" onclick="processOrder('insta')">عبر انستغرام</button>
                </div>
            </div>
        </div>
    </div>

    <div class="products-grid" id="grid"></div>

    <script>
        const WHATSAPP_NUM = "213XXXXXXXXX"; // ضعي رقمك هنا
        const INSTA_USER = "ch_lingerie20"; 

        const products = [
            { id: 1,  img: "1",  ar: "خمار موديل 1", price: 3500 },
            { id: 2,  img: "6",  ar: "خمار موديل 2", price: 2500 },
            { id: 3,  img: "9",  ar: "حجاب فلة",    price: 2500 },
            { id: 4,  img: "10", ar: "بيجامة موديل 1", price: 2200 },
            { id: 5,  img: "11", ar: "بيجامة موديل 2", price: 1000 },
            { id: 6,  img: "12", ar: "بيجامة موديل 3", price: 1000 },
            { id: 7,  img: "13", ar: "ROBE HIJAB",   price: 4200 },
            { id: 8,  img: "14", ar: "بيجامة موديل 4", price: 1000 },
            { id: 9,  img: "15", ar: "بيجامة موديل 5", price: 1000 }
        ];

        let cart = {};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=CH'">
                    <h3>${p.ar}</h3>
                    <span class="new-price">${p.price} دج</span>
                    <button class="btn-add" onclick="addToCart(${p.id})">أضيفي للسلة</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            if (cart[id]) cart[id].qty++;
            else {
                const p = products.find(i => i.id === id);
                cart[id] = { ...p, qty: 1 };
            }
            updateUI();
            document.getElementById('cart-sidebar').classList.add('open');
        }

        function removeItem(id) {
            delete cart[id];
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items');
            const orderSection = document.getElementById('order-section');
            let total = 0; let count = 0;
            list.innerHTML = '';
            
            for (let id in cart) {
                const item = cart[id];
                total += (item.price * item.qty);
                count += item.qty;
                list.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.ar}</strong> 
                            <span class="qty-badge">×${item.qty}</span>
                        </div>
                        <div>
                            <span>${item.price * item.qty} دج</span>
                            <button class="remove-item" onclick="removeItem(${id})">×</button>
                        </div>
                    </div>`;
            }
            
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-count').innerText = count;
            orderSection.style.display = count > 0 ? 'block' : 'none';
        }

        function processOrder(platform) {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const phone = document.getElementById('cust-phone').value;

            if(!name || !addr || !phone) return alert("يرجى ملء البيانات أولاً.");

            let msg = `طلب جديد من CH_LINGERIE:\n\n👤 الاسم: ${name}\n📍 العنوان: ${addr}\n📞 الهاتف: ${phone}\n\n📦 المنتجات:\n`;
            for (let id in cart) {
                msg += `- ${cart[id].ar} (الكمية: ${cart[id].qty})\n`;
            }
            msg += `\n💰 الإجمالي: ${document.getElementById('cart-total').innerText} دج`;

            if(platform === 'wa') {
                window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, "_blank");
            } else {
                navigator.clipboard.writeText(msg).then(() => {
                    alert("تم نسخ تفاصيل الطلب! عند فتح انستغرام، اضغط 'لصق' في الرسائل.");
                    window.open(`https://www.instagram.com/direct/t/${INSTA_USER}`, "_blank");
                });
            }
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
        render();
    </script>
</body>
</html>
